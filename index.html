<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#F97316" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Centering" />
    <meta name="description" content="Centering / shuttering work, workers, owners, payments and profit tracker." />
    <title>Centering Manager</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash. This mirrors
      // localStorage['cwm-theme']; Dexie settings is the source of truth and
      // reconciles it on boot (see src/lib/theme.ts + LockGate). Defaults to dark.
      (function () {
        try {
          var dark = localStorage.getItem('cwm-theme') !== 'light'
          if (dark) document.documentElement.classList.add('dark')
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light'
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
