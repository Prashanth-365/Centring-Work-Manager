name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # needed to attach the APK to a GitHub Release on v* tags

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Consistent signing so APK updates install in-place (no "package conflict").
      # scripts/patch-android.sh wires these into android/app/build.gradle; gradle
      # reads them from the environment at build time. Safe to be empty — the
      # build then falls back to the default debug key.
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      # Auto-incrementing versionCode + a readable versionName so Android never
      # blocks a build as a "downgrade".
      CWM_VERSION_CODE: ${{ github.run_number }}
      CWM_VERSION_NAME: 0.2.3.${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # No lockfile is committed, so always use `npm install` (never `npm ci`).
      - name: Install dependencies
        run: npm install

      - name: Build web (dist/)
        run: npm run build
        env:
          # v2-only Google Drive secrets; safe to be empty for v1.
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_OAUTH_REDIRECT_URL: ${{ secrets.VITE_OAUTH_REDIRECT_URL }}

      # android/ is not committed — add it fresh each run.
      - name: Add Android platform
        run: npx cap add android

      # Decode the signing keystore from a base64 secret into android/app/. When
      # the secret isn't set the build continues with the default debug key.
      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_B64" ]; then
            echo "$ANDROID_KEYSTORE_B64" | base64 -d > android/app/release.keystore
            echo "Decoded release keystore to android/app/release.keystore."
          else
            echo "No ANDROID_KEYSTORE_B64 secret — building with the default debug key."
          fi

      - name: Patch Android project
        run: bash scripts/patch-android.sh

      # Generate the app icons (adaptive foreground/background + round + legacy
      # mipmap fallbacks) into android/app/src/main/res from the source art in
      # assets/. Order matters: AFTER `cap add android` + the signing patch and
      # BEFORE `cap sync` so the icons exist when the web assets/plugins sync.
      - name: Generate app icons
        run: npx @capacitor/assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: centering-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
