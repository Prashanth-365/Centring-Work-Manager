      <stop stop-color="#FB9D2B" />
      <stop offset="1" stop-color="#E2730B" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <!-- building / molds stacked as floors -->
  <g stroke="#FFF7ED" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <rect x="150" y="120" width="212" height="272" rx="10" fill="#FFFFFF" fill-opacity="0.14" />
    <line x1="150" y1="188" x2="362" y2="188" />
    <line x1="150" y1="256" x2="362" y2="256" />
    <line x1="150" y1="324" x2="362" y2="324" />
  </g>
  <!-- centering props (diagonal supports) -->
  <g stroke="#1E293B" stroke-width="22" stroke-linecap="round">
    <line x1="118" y1="404" x2="170" y2="300" />
    <line x1="394" y1="404" x2="342" y2="300" />
  </g>
  <line x1="92" y1="404" x2="420" y2="404" stroke="#1E293B" stroke-width="24" stroke-linecap="round" />
</svg>
