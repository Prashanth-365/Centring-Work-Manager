<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Signing in…</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 24px;
        text-align: center;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.25);
        border-top-color: #38bdf8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      a {
        color: #38bdf8;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="spinner"></div>
      <p id="msg">Completing Google sign-in…</p>
    </div>
    <script>
      // Android Custom-Tab OAuth (implicit) redirect target.
      // Google returns the token in the URL fragment (#access_token=...). We hand
      // it back to the native app via a custom-scheme deep link, then close.
      // The web (GIS) flow does NOT use this page.
      (function () {
        var APP_SCHEME = 'app.centering.manager://oauth-success'
        var hash = window.location.hash || ''
        var msg = document.getElementById('msg')
        if (hash && hash.indexOf('access_token=') !== -1) {
          // Forward the entire fragment (access_token, expires_in, state, ...).
          window.location.replace(APP_SCHEME + hash)
          setTimeout(function () {
            msg.textContent = 'You can close this tab and return to the app.'
          }, 1200)
        } else {
          var params = new URLSearchParams(hash.replace(/^#/, '') || window.location.search)
          var err = params.get('error') || 'No access token was returned.'
          msg.textContent = 'Sign-in failed: ' + err
        }
      })()
    </script>
  </body>
</html>
